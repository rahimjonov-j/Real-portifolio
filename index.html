<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javohir Rahimjonov's blog</title>
    <meta name="theme-color" content="#233455">
    <meta name="msapplication-TileColor" content="#233455">
    <meta name="msapplication-TileImage" content="./mstile-150x150.png?v=20260416b">
    <link rel="icon" type="image/x-icon" href="./favicon.ico?v=20260416b">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260416b">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260416b">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260416b">
    <link rel="manifest" href="./site.webmanifest?v=20260416b">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: #ffffff;
            color: #333333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Sayt kengligi va o'rtaga joylashishi */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        /* Silliq paydo bo'lish animatsiyasi (Smooth fade-in) */
        .fade-in {
            animation: fadeInTop 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInTop {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header qismi */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0 4rem 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        nav a {
            text-decoration: none;
            color: #666666;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #000000;
        }

        /* Asosiy kontent */
        main {
            flex: 1;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            margin-bottom: 2rem;
        }

        .profile-image {
            flex-shrink: 0;
        }

        .profile-picture {
            width: 160px;
            height: 160px;
            display: block;
        }

        .profile-logo {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 26%;
            border: 4px solid #ffffff;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
        }

        .profile-info h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .profile-info h2 {
            font-size: 1.8rem;
            font-weight: 400;
            color: #737373;
            margin-bottom: 1.2rem;
        }

        /* Ijtimoiy tarmoqlar ikonkasi */
        .social-links {
            display: flex;
            gap: 1.2rem;
        }

        .social-links a {
            color: #1a1a1a;
            font-size: 1.6rem;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .social-links i {
            display: block;
        }

        .social-links a:hover {
            transform: translateY(-3px);
            color: #007bff;
        }

        /* Qisqacha ma'lumot */
        .bio {
            font-size: 1.2rem;
            color: #4a4a4a;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Tugma dizayni */
        .actions {
            margin-bottom: 4rem;
        }

        .btn-outline {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border: 1px solid #007bff;
            color: #007bff;
            background-color: transparent;
            text-decoration: none;
            font-weight: 500;
            border-radius: 4px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background-color: #e6f2ff;
        }

        /* Footer */
        footer {
            text-align: center;
            color: #999999;
            padding: 2rem 0;
            margin-top: auto;
            font-size: 0.9rem;
        }

        /* Mobil qurilmalar uchun moslashuvchanlik */
        @media (max-width: 600px) {
            .profile-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.5rem;
            }
            .profile-info h1 {
                font-size: 2.2rem;
            }
            .profile-info h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <header>
            <div class="logo">Javohir dev </div>
            <nav>
                <a href="./projects.html">Projects</a>
            </nav>
        </header>

        <main>
            <div class="profile-section">
                <div class="profile-image">
                    <picture class="profile-picture">
                        <source
                            type="image/webp"
                            srcset="./img/optimized/me-160.webp 160w, ./img/optimized/me-320.webp 320w"
                            sizes="160px">
                        <img
                            class="profile-logo"
                            src="./img/optimized/me-320.jpg"
                            srcset="./img/optimized/me-160.jpg 160w, ./img/optimized/me-320.jpg 320w"
                            sizes="160px"
                            width="320"
                            height="480"
                            alt="Javohir Rahimjonov rasmi"
                            decoding="async"
                            fetchpriority="high">
                    </picture>
                </div>
                <div class="profile-info">
                    <h1>Javohir Rahimjonov</h1>
                    <h2>Frontend Dasturchisi</h2>
                    <div class="social-links">
               
                        <a href="https://github.com/rahimjonov-j" target="_blank"><i class="fab fa-github"></i></a>
                        <a href="https://www.linkedin.com/in/javohir-rahimjonov" target="_blank"><i class="fab fa-linkedin"></i></a>
                        <a href="https://t.me/rahimjonovv_19" target="_blank"><i class="fab fa-telegram"></i></a>
                    </div>
                </div>
            </div>

            <div class="bio">
                <p>Bu sayt men haqimda qisqacha tasvirlab beradi.</p>
            </div>

            <div class="actions">
                <a href="./about.html" class="btn-outline">Haqida</a>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Javohir.com</p>
        </footer>
    </div>

</body>
</html>
